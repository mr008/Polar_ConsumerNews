name: collect

# Pulls the feed, scores it, and drafts commentary into the review queue.
# Runs hourly. Short job → stays well inside the free Actions minutes.
on:
  schedule:
    - cron: "7 * * * *"      # hourly at :07
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .
      - name: collect -> score -> draft
        env:
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          xbot collect
          xbot draft
          xbot report
