name: collect

# Reads the feed, judges it (Claude), drafts commentary, snapshots the follower
# count (once/day), and runs the reply engine — all into Turso.
# Every 3h: since_id read-dedup means the SAME total posts are read per month as
# the old 6h cadence (each run only pays for posts newer than the last one
# stored) — fresher targets for the reply engine at no extra read cost.
on:
  schedule:
    - cron: "0 */3 * * *"     # every 3 hours
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[x,llm,turso]"
      - name: collect -> draft -> snapshot -> reply -> report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          xbot collect
          xbot draft
          xbot snapshot
          xbot reply-scan
          xbot report
