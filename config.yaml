# xbot configuration. Tunables live here; SECRETS live in .env.
# See ARCHITECTURE.md for the rationale behind every value.

mode:
  source: api                  # LIVE: reading your real home timeline
  publisher: api               # LIVE: posts go to X
  autonomous: true             # AUTONOMOUS: the publish workflow posts without manual review

scoping:
  source_timeline: home        # full home timeline — following already curated, no List
  # Read ceiling PER COLLECT RUN (4 runs/day). since_id dedup means a run only
  # pays for posts newer than the last one stored, so typical spend per run is
  # "new posts since 6h ago", not the ceiling. ~$0.005/post returned.
  max_posts_per_day: 50
  # CIRCUIT BREAKER: hard cap on paid reads per calendar month (~$20 at 4000).
  # collect refuses to run beyond it and logs why. 0 = disabled.
  monthly_read_budget: 4000
  # Re-poll live engagement for the queue + top candidates each scoring pass
  # (PAID: ~$0.005 each — ~$6/mo at 10). Keeps the engagement leg of ranking
  # live; since_id collection never refreshes metrics on its own. 0 = off.
  metrics_refresh_top: 10
  languages: [en]

ranking:
  # TEACHING VALUE is primary; engagement is only a secondary sanity-check.
  # quote_score = teaching_weight*teaching + (1-teaching_weight)*engagement, gated by topic.
  teaching_weight: 0.65
  use_llm_judge: true          # the LLM READS each post and scores real teaching value
  judge_model: "claude-haiku-4-5-20251001"   # Haiku — cheap, high-volume classification
  # QA GATE: a Haiku editor pass on every draft — rejects meta-commentary
  # ("drop the full thread..."), no-lesson drafts, broken format. One revision
  # attempt before a draft is blocked. Fail-open if the LLM is unavailable.
  qa_gate: true
  judge_examples:              # the owner's own calls — few-shot the judge to YOUR taste
    - text: "save this for when you overthink your marketing — millions of views from reusing the same AI image. the opportunity is right there."
      verdict: good
      why: "real distribution insight (content reuse) under casual framing — reward it"

scoring_weights:               # ENGAGEMENT composite (the secondary signal).
  # Favors under-distributed gems (eng/follower) and multiple trusted shares (echo)
  # over raw vanity metrics (likes, velocity) — high reach != good teaching.
  likes: 0.05
  reposts: 0.15
  velocity: 0.10
  eng_per_follower: 0.25
  echo: 0.25
  recency: 0.10
  topic_fit: 0.10

thresholds:
  topic_fit_min: 0.55
  quote_worthy_min: 0.35       # looser floor — keeps resonant posts (e.g. adriamatz)
  near_dup_similarity: 0.82
recency_tau_hours: 8

topics:
  focus: viral_consumer_app_content
  include:
    - ai ugc
    - content marketing
    - viral content
    - app growth
    - distribution
    - consumer apps
    - product
    - startups
  keywords:                    # cheap offline topic-fit signal (real version uses embeddings/LLM)
    - ugc
    - viral
    - views
    - content
    - marketing
    - growth
    - app
    - product
    - startup
    - founder
    - launch
    - distribution
    - hook
    - algorithm
    - retention
    - acquisition

posting:
  per_day: 3                   # hard daily cap (publish_due re-checks posted_log)
  per_run: 1                   # each scheduled window posts at most one draft
  # Draft queue = small standby buffer, NOT a backlog: collect tops it up to
  # per_day+1 pending drafts (one spare in case a publish fails), and anything
  # older than draft_max_age_hours expires so commentary never goes stale.
  draft_max_age_hours: 48
  # Research-backed windows (Buffer 8.7M-post study, Sprout Social, 2026): weekday
  # late-morning→afternoon in the audience's local time wins; audience spans ET→PT.
  # The publish workflow's cron fires at each window start + sleeps 0-90 random
  # minutes, so the actual post time differs every day.
  windows: ["08:00-09:30", "12:00-13:30", "16:30-18:00"]
  timezone: "America/Los_Angeles"
  jitter_minutes: 90           # documented here; enforced in .github/workflows/publish.yml
  min_gap_minutes: 90
  author_cooldown_days: 5
  # When the queue is full but a new candidate beats the weakest pending draft
  # by this quote_score margin, the weak draft is retired and replaced.
  supersede_margin: 0.15
  # Cross-account quote_tweet_id is broken (X, ~Feb 2026). Instead, post standalone
  # and append the source URL — X often auto-embeds it as a quote card, and it's a
  # clickable link either way. NOTE: a URL bumps the write to ~$0.20/post (vs $0.015).
  link_instead_of_quote: true

safety:
  exclude: [politics, ragebait, nsfw, harassment, personal_drama, medical_advice, legal_advice, investment_advice]
  # app-revenue / "$X-mo" growth stories are IN-SCOPE marketing content (NOT financial advice).
  require_public_author: true
  toxicity_max: 0.3

voice:
  style: growth_first          # punchy operator energy; NOT measured-curator
  angle: skill_sharing         # teach the tactic: why it works / the move to steal
  format: compact_breakdown    # single post: hook + 2-4 bullets + takeaway
  allow_thread_for_top_posts: false
  tone: straight               # report author's claims neutrally; no hedge, no vouching
  protagonist: me              # post is about ME (the teacher), author de-emphasized
  author_emphasis: low
  credit_style: subtle_tail    # small "h/t @handle" tail only (embed shows the source)
  hype_ok: true
  include_source_link: false   # quote embed carries source; a URL triggers the $0.20 write tier
  fabrication: forbidden
  anchors:
    - https://x.com/adriamatz/status/2062619382631497931
    - https://x.com/ErnestoSOFTWARE/status/2062621170042917373

llm:
  provider: anthropic                   # anthropic | groq | xai | gemini | openai | auto
  commentary_model: "claude-sonnet-4-6"            # Sonnet — the public voice
  classifier_model: "claude-haiku-4-5-20251001"    # (legacy field; judge_model below is used)
  embeddings_model: "text-embedding-3-small"
  max_commentary_chars: 230    # leaves room for the appended source URL (link mode)
  temperature: 0.7

ops:
  db_path: "data/state.db"
  collector_interval_minutes: 60
  watchlist_repoll_hours: [1, 3, 6]
  kill_switch_file: "data/STOP"
  report_webhook_env: "REPORT_WEBHOOK"
